name: Coffee Bot Listener
on:
  # Restart every hour to stay within GitHub Actions job limits
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  listen:
    runs-on: ubuntu-latest
    # Write permission needed to commit state.json back to the repo
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use a PAT so the bot's git push triggers other workflows if needed
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Poll for Telegram commands (~50 min)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python bot.py poll
